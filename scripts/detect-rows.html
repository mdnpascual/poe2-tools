<!DOCTYPE html>
<html>
<head>
  <title>Row Divider Detector</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #eee; margin: 20px; }
    .controls { margin-bottom: 15px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
    .control label { display: block; font-size: 12px; margin-bottom: 2px; }
    .control input[type=range] { width: 200px; }
    .control span { font-size: 11px; color: #aaa; }
    .canvases { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
    canvas { border: 1px solid #444; }
    #status { color: #0f0; margin-bottom: 10px; }
    #info { margin-top: 10px; color: #aaa; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Row Divider Detector</h2>
  <div id="status">Loading OpenCV.js...</div>

  <div class="controls">
    <div class="control">
      <label>Strip Left % (skip icons): <span id="stripLeftVal">0</span></label>
      <input type="range" id="stripLeft" min="0" max="80" value="0" step="5">
    </div>
    <div class="control">
      <label>Brightness Threshold: <span id="threshVal">137</span></label>
      <input type="range" id="thresh" min="100" max="255" value="137" step="1">
    </div>
    <div class="control">
      <label>Min Divider Height (px): <span id="minDivVal">2</span></label>
      <input type="range" id="minDiv" min="1" max="30" value="2" step="1">
    </div>
    <div class="control">
      <label>Min Row Height (px): <span id="minRowVal">50</span></label>
      <input type="range" id="minRow" min="10" max="200" value="50" step="5">
    </div>
    <div class="control">
      <label>Top Crop (px): <span id="topCropVal">0</span></label>
      <input type="range" id="topCrop" min="0" max="200" value="0" step="5">
    </div>
    <div class="control">
      <label>White-out squares first</label>
      <input type="checkbox" id="whiteOutSquares" checked>
    </div>
  </div>

  <div class="canvases">
    <div>
      <div style="font-size:12px; margin-bottom:4px;">Detected Rows (red = divider, green = row bounds)</div>
      <canvas id="output"></canvas>
    </div>
    <div>
      <div style="font-size:12px; margin-bottom:4px;">Brightness Profile (right strip avg per row)</div>
      <canvas id="profile" width="300"></canvas>
    </div>
  </div>
  <div id="info"></div>

  <div style="margin-top:15px">
    <input type="file" id="fileInput" accept="image/*">
    <span style="color:#888; font-size:12px;">Load your reward-panel-debug.png here</span>
  </div>

  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
  <script>
    let srcCanvas = null;
    let cvReady = false;

    function onOpenCvReady() {
      if (typeof cv === 'undefined') return;
      if (cv.getBuildInformation) { cvReady = true; ready(); }
      else { cv['onRuntimeInitialized'] = () => { cvReady = true; ready(); }; }
    }
    var Module = { onRuntimeInitialized() { cvReady = true; ready(); } };
    function ready() { document.getElementById('status').textContent = 'OpenCV.js ready. Load an image.'; }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          srcCanvas = document.createElement('canvas');
          srcCanvas.width = img.width;
          srcCanvas.height = img.height;
          srcCanvas.getContext('2d').drawImage(img, 0, 0);
          document.getElementById('status').textContent = `Image loaded: ${img.width}x${img.height}`;
          processImage();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    ['stripLeft', 'thresh', 'minDiv', 'minRow', 'topCrop'].forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        document.getElementById(id + 'Val').textContent = e.target.value;
        if (srcCanvas) processImage();
      });
    });
    document.getElementById('whiteOutSquares').addEventListener('change', () => { if (srcCanvas) processImage(); });

    function detectSquaresFromEdges(edges, minArea, maxArea, epsilonPct, aspectTol) {
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
      const rects = [];
      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const area = cv.contourArea(cnt);
        if (area < minArea || area > maxArea) continue;
        const peri = cv.arcLength(cnt, true);
        if (peri <= 0) continue;
        const approx = new cv.Mat();
        cv.approxPolyDP(cnt, approx, epsilonPct * peri, true);
        if (approx.rows === 4 && cv.isContourConvex(approx)) {
          const rect = cv.boundingRect(approx);
          const aspect = Math.min(rect.width, rect.height) / Math.max(rect.width, rect.height);
          if (aspect > (1 - aspectTol)) rects.push(rect);
        }
        approx.delete();
      }
      contours.delete(); hierarchy.delete();
      return rects;
    }

    function detectAllSquares(gray) {
      const minArea = 3000, maxArea = 10000, epsilonPct = 0.10, aspectTol = 0.05;
      const allRects = [];

      // Pass 1: Canny + dilate=1
      const edges1 = new cv.Mat();
      cv.Canny(gray, edges1, 115, 255);
      const k1 = cv.Mat.ones(3, 3, cv.CV_8U);
      cv.dilate(edges1, edges1, k1, new cv.Point(-1, -1), 1);
      k1.delete();
      allRects.push(...detectSquaresFromEdges(edges1, minArea, maxArea, epsilonPct, aspectTol));
      edges1.delete();

      // Pass 2: Canny + dilate=0
      const edges2 = new cv.Mat();
      cv.Canny(gray, edges2, 115, 255);
      allRects.push(...detectSquaresFromEdges(edges2, minArea, maxArea, epsilonPct, aspectTol));
      edges2.delete();

      // Pass 3: Adaptive threshold + morph close
      const thresh = new cv.Mat();
      cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 51, -1);
      const k3 = cv.Mat.ones(3, 3, cv.CV_8U);
      cv.morphologyEx(thresh, thresh, cv.MORPH_CLOSE, k3, new cv.Point(-1, -1), 1);
      k3.delete();
      allRects.push(...detectSquaresFromEdges(thresh, minArea, maxArea, epsilonPct, aspectTol));
      thresh.delete();

      // Deduplicate overlapping rects (merge if IoU > 0.5)
      const unique = [];
      for (const r of allRects) {
        let dup = false;
        for (const u of unique) {
          const ox = Math.max(0, Math.min(r.x + r.width, u.x + u.width) - Math.max(r.x, u.x));
          const oy = Math.max(0, Math.min(r.y + r.height, u.y + u.height) - Math.max(r.y, u.y));
          const inter = ox * oy;
          const union = r.width * r.height + u.width * u.height - inter;
          if (inter / union > 0.5) { dup = true; break; }
        }
        if (!dup) unique.push(r);
      }
      return unique;
    }

    function processImage() {
      if (!cvReady || !srcCanvas) return;

      const stripLeftPct = +document.getElementById('stripLeft').value / 100;
      const brightnessThresh = +document.getElementById('thresh').value;
      const minDivHeight = +document.getElementById('minDiv').value;
      const minRowHeight = +document.getElementById('minRow').value;
      const topCrop = +document.getElementById('topCrop').value;

      let src, gray;
      try {
        src = cv.imread(srcCanvas);
        gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        const width = gray.cols;
        const height = gray.rows;

        // White-out detected squares (3-pass: Canny+dilate1, Canny+dilate0, adaptive threshold)
        if (document.getElementById('whiteOutSquares').checked) {
          const squareRects = detectAllSquares(gray);
          for (const rect of squareRects) {
            cv.rectangle(src, new cv.Point(rect.x, rect.y),
              new cv.Point(rect.x + rect.width, rect.y + rect.height),
              new cv.Scalar(255, 255, 255, 255), cv.FILLED);
            // Also white out in gray for brightness profile
            cv.rectangle(gray, new cv.Point(rect.x, rect.y),
              new cv.Point(rect.x + rect.width, rect.y + rect.height),
              new cv.Scalar(255), cv.FILLED);
          }
        }

        const startX = Math.floor(width * stripLeftPct);

        // Compute average brightness per row in the right strip
        const profile = new Array(height);
        for (let y = 0; y < height; y++) {
          let sum = 0;
          for (let x = startX; x < width; x++) {
            sum += gray.ucharAt(y, x);
          }
          profile[y] = sum / (width - startX);
        }

        // Find divider regions: consecutive rows below threshold
        const dividers = []; // {y, height}
        let inDiv = false, divStart = 0;
        for (let y = topCrop; y < height; y++) {
          if (!inDiv && profile[y] < brightnessThresh) {
            inDiv = true;
            divStart = y;
          } else if (inDiv && profile[y] >= brightnessThresh) {
            inDiv = false;
            const h = y - divStart;
            if (h >= minDivHeight) {
              dividers.push({ y: divStart, height: h });
            }
          }
        }
        // Close trailing divider (catches bottom edge/parchment)
        if (inDiv) {
          const h = height - divStart;
          if (h >= minDivHeight) dividers.push({ y: divStart, height: h });
        }

        // Derive rows: first row is y=0 to first divider, then between consecutive dividers
        const rows = [];
        if (dividers.length > 0) {
          const firstRowH = dividers[0].y;
          if (firstRowH >= minRowHeight) {
            rows.push({ y: 0, height: firstRowH });
          }
          for (let i = 0; i < dividers.length - 1; i++) {
            const rowY = dividers[i].y + dividers[i].height;
            const rowH = dividers[i + 1].y - rowY;
            if (rowH >= minRowHeight) {
              rows.push({ y: rowY, height: rowH });
            }
          }
          // Last row: after last divider to end of bright content
          const lastDivEnd = dividers[dividers.length - 1].y + dividers[dividers.length - 1].height;
          // Check if there's still a bright row after the last divider
          let lastRowEnd = lastDivEnd;
          for (let y = lastDivEnd; y < height; y++) {
            if (profile[y] < brightnessThresh) { lastRowEnd = y; break; }
            lastRowEnd = y + 1;
          }
          const lastRowH = lastRowEnd - lastDivEnd;
          if (lastRowH >= minRowHeight) {
            rows.push({ y: lastDivEnd, height: lastRowH });
          }
        }

        // Draw on output canvas
        const dst = src.clone();
        // Draw dividers in red
        for (const d of dividers) {
          cv.rectangle(dst, new cv.Point(0, d.y), new cv.Point(width, d.y + d.height),
            new cv.Scalar(255, 0, 0, 128), 2);
        }
        // Draw rows in green
        for (const r of rows) {
          cv.rectangle(dst, new cv.Point(0, r.y), new cv.Point(width, r.y + r.height),
            new cv.Scalar(0, 255, 0, 255), 2);
        }
        // Draw the strip boundary as a vertical cyan line
        cv.line(dst, new cv.Point(startX, 0), new cv.Point(startX, height),
          new cv.Scalar(0, 255, 255, 255), 1);

        cv.imshow('output', dst);
        dst.delete();

        // Draw brightness profile
        const profileCanvas = document.getElementById('profile');
        profileCanvas.height = height;
        const ctx = profileCanvas.getContext('2d');
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(0, 0, 300, height);

        // Profile line
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let y = 0; y < height; y++) {
          const x = (profile[y] / 255) * 280;
          if (y === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Threshold line
        ctx.strokeStyle = '#f00';
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        const tx = (brightnessThresh / 255) * 280;
        ctx.moveTo(tx, 0);
        ctx.lineTo(tx, height);
        ctx.stroke();
        ctx.setLineDash([]);

        // Row markers
        ctx.strokeStyle = '#0f0';
        for (const r of rows) {
          ctx.beginPath();
          ctx.moveTo(0, r.y);
          ctx.lineTo(300, r.y);
          ctx.moveTo(0, r.y + r.height);
          ctx.lineTo(300, r.y + r.height);
          ctx.stroke();
        }

        document.getElementById('info').textContent =
          `Dividers found: ${dividers.length}\n` +
          `Rows detected: ${rows.length}\n\n` +
          `Dividers:\n` +
          dividers.map((d, i) => `  #${i}: y=${d.y} h=${d.height} (avg brightness: ${profile[d.y].toFixed(0)}-${profile[d.y + d.height - 1].toFixed(0)})`).join('\n') +
          `\n\nRows:\n` +
          rows.map((r, i) => `  #${i}: y=${r.y} h=${r.height}`).join('\n');

      } catch (e) {
        document.getElementById('info').textContent = `Error: ${e}`;
      } finally {
        if (src) src.delete();
        if (gray) gray.delete();
      }
    }
  </script>
</body>
</html>
