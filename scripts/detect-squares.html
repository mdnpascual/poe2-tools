<!DOCTYPE html>
<html>
<head>
  <title>Square Detector - OpenCV.js</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #eee; margin: 20px; }
    .controls { margin-bottom: 15px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
    .control label { display: block; font-size: 12px; margin-bottom: 2px; }
    .control input[type=range] { width: 200px; }
    .control span { font-size: 11px; color: #aaa; }
    canvas { border: 1px solid #444; max-width: 100%; }
    #status { color: #0f0; margin-bottom: 10px; }
    #info { margin-top: 10px; color: #aaa; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Square Detector</h2>
  <div id="status">Loading OpenCV.js...</div>

  <div class="controls">
    <div class="control">
      <label>Canny Low: <span id="cannyLowVal">50</span></label>
      <input type="range" id="cannyLow" min="0" max="255" value="50">
    </div>
    <div class="control">
      <label>Canny High: <span id="cannyHighVal">150</span></label>
      <input type="range" id="cannyHigh" min="0" max="255" value="150">
    </div>
    <div class="control">
      <label>Min Area: <span id="minAreaVal">500</span></label>
      <input type="range" id="minArea" min="100" max="10000" value="500" step="100">
    </div>
    <div class="control">
      <label>Max Area: <span id="maxAreaVal">50000</span></label>
      <input type="range" id="maxArea" min="1000" max="200000" value="50000" step="1000">
    </div>
    <div class="control">
      <label>Approx Epsilon %: <span id="epsilonVal">2</span></label>
      <input type="range" id="epsilon" min="1" max="20" value="2" step="0.5">
    </div>
    <div class="control">
      <label>Aspect Ratio Tolerance: <span id="aspectVal">0.3</span></label>
      <input type="range" id="aspect" min="0.05" max="0.8" value="0.3" step="0.05">
    </div>
    <div class="control">
      <label>Contour Mode:</label>
      <select id="retrMode">
        <option value="list">RETR_LIST (all)</option>
        <option value="external">RETR_EXTERNAL (outer only)</option>
      </select>
    </div>
    <div class="control">
      <label>Blur (kernel): <span id="blurVal">0</span></label>
      <input type="range" id="blur" min="0" max="15" value="0" step="2">
    </div>
    <div class="control">
      <label>Dilate (iterations): <span id="dilateVal">0</span></label>
      <input type="range" id="dilate" min="0" max="5" value="0">
    </div>
  </div>

  <canvas id="output"></canvas>
  <div id="info"></div>

  <!-- Load image via file input since local file:// won't work with fetch -->
  <div style="margin-top:15px">
    <input type="file" id="fileInput" accept="image/*">
    <span style="color:#888; font-size:12px;">Load your reward-panel-debug.png here</span>
  </div>

  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
  <script>
    let srcCanvas = null; // keep a clean source canvas to re-read from
    let cvReady = false;

    function onOpenCvReady() {
      if (typeof cv === 'undefined') return;
      if (cv.getBuildInformation) {
        cvReady = true;
        document.getElementById('status').textContent = 'OpenCV.js ready. Load an image to begin.';
      } else {
        cv['onRuntimeInitialized'] = () => {
          cvReady = true;
          document.getElementById('status').textContent = 'OpenCV.js ready. Load an image to begin.';
        };
      }
    }

    var Module = {
      onRuntimeInitialized() {
        cvReady = true;
        document.getElementById('status').textContent = 'OpenCV.js ready. Load an image to begin.';
      }
    };

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          srcCanvas = document.createElement('canvas');
          srcCanvas.width = img.width;
          srcCanvas.height = img.height;
          srcCanvas.getContext('2d').drawImage(img, 0, 0);
          document.getElementById('status').textContent = `Image loaded: ${img.width}x${img.height}`;
          processImage();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Sliders
    const sliders = ['cannyLow', 'cannyHigh', 'minArea', 'maxArea', 'epsilon', 'aspect', 'blur', 'dilate'];
    sliders.forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        document.getElementById(id + 'Val').textContent = e.target.value;
        if (srcCanvas) processImage();
      });
    });
    document.getElementById('retrMode').addEventListener('change', () => { if (srcCanvas) processImage(); });

    function processImage() {
      if (!cvReady || !srcCanvas) return;

      const cannyLow = +document.getElementById('cannyLow').value;
      const cannyHigh = +document.getElementById('cannyHigh').value;
      const minArea = +document.getElementById('minArea').value;
      const maxArea = +document.getElementById('maxArea').value;
      const epsilonPct = +document.getElementById('epsilon').value / 100;
      const aspectTol = +document.getElementById('aspect').value;

      // Enforce cannyHigh >= cannyLow
      if (cannyHigh < cannyLow) {
        document.getElementById('info').textContent = 'Error: Canny High must be >= Canny Low';
        return;
      }

      let src, gray, edges, contours, hierarchy, dst;
      try {
        src = cv.imread(srcCanvas);
        gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        // Optional blur
        const blurSize = +document.getElementById('blur').value;
        if (blurSize >= 3) {
          const ksize = new cv.Size(blurSize, blurSize);
          cv.GaussianBlur(gray, gray, ksize, 0);
        }

        edges = new cv.Mat();
        cv.Canny(gray, edges, cannyLow, cannyHigh);

        // Optional dilation to close edge gaps
        const dilateIter = +document.getElementById('dilate').value;
        if (dilateIter > 0) {
          const kernel = cv.Mat.ones(3, 3, cv.CV_8U);
          cv.dilate(edges, edges, kernel, new cv.Point(-1, -1), dilateIter);
          kernel.delete();
        }

        contours = new cv.MatVector();
        hierarchy = new cv.Mat();
        const retrMode = document.getElementById('retrMode').value === 'list' ? cv.RETR_LIST : cv.RETR_EXTERNAL;
        cv.findContours(edges, contours, hierarchy, retrMode, cv.CHAIN_APPROX_SIMPLE);

        dst = src.clone();
        const squares = [];

        for (let i = 0; i < contours.size(); i++) {
          const cnt = contours.get(i);
          const area = cv.contourArea(cnt);
          if (area < minArea || area > maxArea) continue;

          const peri = cv.arcLength(cnt, true);
          if (peri <= 0) continue;

          const eps = epsilonPct * peri;
          if (eps <= 0) continue;

          const approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, eps, true);

          if (approx.rows === 4 && cv.isContourConvex(approx)) {
            const rect = cv.boundingRect(approx);
            const aspect = Math.min(rect.width, rect.height) / Math.max(rect.width, rect.height);
            if (aspect > (1 - aspectTol)) {
              squares.push(rect);
              cv.rectangle(dst,
                new cv.Point(rect.x, rect.y),
                new cv.Point(rect.x + rect.width, rect.y + rect.height),
                new cv.Scalar(0, 255, 0, 255), 2);
            }
          }
          approx.delete();
        }

        cv.imshow('output', dst);

        document.getElementById('info').textContent =
          `Contours found: ${contours.size()}\n` +
          `Squares detected: ${squares.length}\n` +
          squares.map((r, i) => `  #${i}: x=${r.x} y=${r.y} w=${r.width} h=${r.height}`).join('\n');
      } catch (e) {
        document.getElementById('info').textContent = `OpenCV error: ${e}`;
      } finally {
        if (src) src.delete();
        if (gray) gray.delete();
        if (edges) edges.delete();
        if (contours) contours.delete();
        if (hierarchy) hierarchy.delete();
        if (dst) dst.delete();
      }
    }
  </script>
</body>
</html>
