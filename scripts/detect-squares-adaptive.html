<!DOCTYPE html>
<html>
<head>
  <title>Square Detector - Adaptive Threshold</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #eee; margin: 20px; }
    .controls { margin-bottom: 15px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
    .control label { display: block; font-size: 12px; margin-bottom: 2px; }
    .control input[type=range] { width: 200px; }
    .control span { font-size: 11px; color: #aaa; }
    canvas { border: 1px solid #444; max-width: 100%; }
    #status { color: #0f0; margin-bottom: 10px; }
    #info { margin-top: 10px; color: #aaa; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Square Detector - Adaptive Threshold</h2>
  <div id="status">Loading OpenCV.js...</div>

  <div class="controls">
    <div class="control">
      <label>Block Size: <span id="blockSizeVal">15</span></label>
      <input type="range" id="blockSize" min="3" max="51" value="15" step="2">
    </div>
    <div class="control">
      <label>C (constant): <span id="cVal">5</span></label>
      <input type="range" id="c" min="-10" max="30" value="5" step="1">
    </div>
    <div class="control">
      <label>Close Kernel: <span id="closeVal">3</span></label>
      <select id="close">
        <option value="0">0 (off)</option>
        <option value="3" selected>3</option>
        <option value="5">5</option>
        <option value="7">7</option>
        <option value="9">9</option>
        <option value="11">11</option>
        <option value="13">13</option>
        <option value="15">15</option>
      </select>
    </div>
    <div class="control">
      <label>Close Iterations: <span id="closeIterVal">1</span></label>
      <input type="range" id="closeIter" min="1" max="5" value="1">
    </div>
    <div class="control">
      <label>Min Area: <span id="minAreaVal">3000</span></label>
      <input type="range" id="minArea" min="100" max="20000" value="3000" step="100">
    </div>
    <div class="control">
      <label>Max Area: <span id="maxAreaVal">10000</span></label>
      <input type="range" id="maxArea" min="1000" max="200000" value="10000" step="1000">
    </div>
    <div class="control">
      <label>Approx Epsilon %: <span id="epsilonVal">10</span></label>
      <input type="range" id="epsilon" min="1" max="20" value="10" step="0.5">
    </div>
    <div class="control">
      <label>Aspect Ratio Tolerance: <span id="aspectVal">0.05</span></label>
      <input type="range" id="aspect" min="0.05" max="0.8" value="0.05" step="0.05">
    </div>
    <div class="control">
      <label>Contour Mode:</label>
      <select id="retrMode">
        <option value="list" selected>RETR_LIST (all)</option>
        <option value="external">RETR_EXTERNAL (outer only)</option>
      </select>
    </div>
    <div class="control">
      <label>Method:</label>
      <select id="method">
        <option value="gaussian" selected>ADAPTIVE_THRESH_GAUSSIAN_C</option>
        <option value="mean">ADAPTIVE_THRESH_MEAN_C</option>
      </select>
    </div>
    <div class="control">
      <label>Show threshold image</label>
      <input type="checkbox" id="showThresh">
    </div>
  </div>

  <canvas id="output"></canvas>
  <div id="info"></div>

  <div style="margin-top:15px">
    <input type="file" id="fileInput" accept="image/*">
    <span style="color:#888; font-size:12px;">Load your reward-panel-debug.png here</span>
  </div>

  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
  <script>
    let srcCanvas = null;
    let cvReady = false;

    function onOpenCvReady() {
      if (typeof cv === 'undefined') return;
      if (cv.getBuildInformation) {
        cvReady = true;
        document.getElementById('status').textContent = 'OpenCV.js ready. Load an image to begin.';
      } else {
        cv['onRuntimeInitialized'] = () => {
          cvReady = true;
          document.getElementById('status').textContent = 'OpenCV.js ready. Load an image to begin.';
        };
      }
    }

    var Module = {
      onRuntimeInitialized() {
        cvReady = true;
        document.getElementById('status').textContent = 'OpenCV.js ready. Load an image to begin.';
      }
    };

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          srcCanvas = document.createElement('canvas');
          srcCanvas.width = img.width;
          srcCanvas.height = img.height;
          srcCanvas.getContext('2d').drawImage(img, 0, 0);
          document.getElementById('status').textContent = `Image loaded: ${img.width}x${img.height}`;
          processImage();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    const sliders = ['blockSize', 'c', 'closeIter', 'minArea', 'maxArea', 'epsilon', 'aspect'];
    sliders.forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        document.getElementById(id + 'Val').textContent = e.target.value;
        if (srcCanvas) processImage();
      });
    });
    document.getElementById('close').addEventListener('change', () => { if (srcCanvas) processImage(); });
    document.getElementById('retrMode').addEventListener('change', () => { if (srcCanvas) processImage(); });
    document.getElementById('method').addEventListener('change', () => { if (srcCanvas) processImage(); });
    document.getElementById('showThresh').addEventListener('change', () => { if (srcCanvas) processImage(); });

    function processImage() {
      if (!cvReady || !srcCanvas) return;

      const blockSize = +document.getElementById('blockSize').value;
      const C = +document.getElementById('c').value;
      const closeSize = +document.getElementById('close').value;
      const closeIter = +document.getElementById('closeIter').value;
      const minArea = +document.getElementById('minArea').value;
      const maxArea = +document.getElementById('maxArea').value;
      const epsilonPct = +document.getElementById('epsilon').value / 100;
      const aspectTol = +document.getElementById('aspect').value;
      const showThresh = document.getElementById('showThresh').checked;

      let src, gray, thresh, contours, hierarchy, dst;
      try {
        src = cv.imread(srcCanvas);
        gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        thresh = new cv.Mat();
        const method = document.getElementById('method').value === 'gaussian'
          ? cv.ADAPTIVE_THRESH_GAUSSIAN_C
          : cv.ADAPTIVE_THRESH_MEAN_C;
        cv.adaptiveThreshold(gray, thresh, 255, method, cv.THRESH_BINARY_INV, blockSize, C);

        // Morphological close to connect border gaps
        if (closeSize >= 3) {
          const kernel = cv.Mat.ones(closeSize, closeSize, cv.CV_8U);
          cv.morphologyEx(thresh, thresh, cv.MORPH_CLOSE, kernel, new cv.Point(-1, -1), closeIter);
          kernel.delete();
        }

        contours = new cv.MatVector();
        hierarchy = new cv.Mat();
        const retrMode = document.getElementById('retrMode').value === 'list' ? cv.RETR_LIST : cv.RETR_EXTERNAL;
        cv.findContours(thresh, contours, hierarchy, retrMode, cv.CHAIN_APPROX_SIMPLE);

        dst = showThresh ? (() => { const d = new cv.Mat(); cv.cvtColor(thresh, d, cv.COLOR_GRAY2RGBA); return d; })() : src.clone();
        const squares = [];

        for (let i = 0; i < contours.size(); i++) {
          const cnt = contours.get(i);
          const area = cv.contourArea(cnt);
          if (area < minArea || area > maxArea) continue;

          const peri = cv.arcLength(cnt, true);
          if (peri <= 0) continue;

          const eps = epsilonPct * peri;
          if (eps <= 0) continue;

          const approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, eps, true);

          if (approx.rows === 4 && cv.isContourConvex(approx)) {
            const rect = cv.boundingRect(approx);
            const aspect = Math.min(rect.width, rect.height) / Math.max(rect.width, rect.height);
            if (aspect > (1 - aspectTol)) {
              squares.push(rect);
              cv.rectangle(dst,
                new cv.Point(rect.x, rect.y),
                new cv.Point(rect.x + rect.width, rect.y + rect.height),
                new cv.Scalar(0, 255, 0, 255), 2);
            }
          }
          approx.delete();
        }

        cv.imshow('output', dst);

        document.getElementById('info').textContent =
          `Contours found: ${contours.size()}\n` +
          `Squares detected: ${squares.length}\n` +
          squares.map((r, i) => `  #${i}: x=${r.x} y=${r.y} w=${r.width} h=${r.height}`).join('\n');
      } catch (e) {
        document.getElementById('info').textContent = `OpenCV error: ${e}`;
      } finally {
        if (src) src.delete();
        if (gray) gray.delete();
        if (thresh) thresh.delete();
        if (contours) contours.delete();
        if (hierarchy) hierarchy.delete();
        if (dst) dst.delete();
      }
    }
  </script>
</body>
</html>
